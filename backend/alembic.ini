# Alembic 設定ファイル
# 実行ディレクトリ: backend/
# 実行例: cd backend && alembic upgrade head

[alembic]
# マイグレーションスクリプトの格納ディレクトリ
script_location = alembic

# ファイル名テンプレート: YYYYMMDD_<revid>_<slug>.py
# %% は ConfigParser のエスケープ (実際は %(year)d として解釈される)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# alembic.ini のあるディレクトリ (backend/) を sys.path に追加する
# これにより `from app.xxx import ...` が機能する
prepend_sys_path = .

# slug (コメント部) の最大文字数
truncate_slug_length = 40

# タイムゾーン (Create Date のタイムスタンプに使用)
timezone = UTC

# sqlalchemy.url はここでは placeholder のみ記載し、
# 実際の URL は alembic/env.py で app.config.Settings から注入する。
# この値は env.py の config.set_main_option() によって上書きされる。
sqlalchemy.url = driver://user:pass@host/dbname


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
