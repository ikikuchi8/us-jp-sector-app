version: "3.9"

services:
  db:
    image: postgres:16
    container_name: us_jp_sector_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sector_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sector_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sector_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sector_user} -d ${POSTGRES_DB:-sector_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
